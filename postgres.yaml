apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:{app: postgres}
  template:
    metadata:{labels:{app: postgres}}
    spec:
      containers:
      - name: postgres
        image: postgres:16
        env:
        - {name: POSTGRES_DB, value: appdb}
        - {name: POSTGRES_USER, value: appuser}
        - {name: POSTGRES_PASSWORD, valueFrom:{secretKeyRef:{name: db-secret,key: POSTGRES_PASSWORD}}}
        volumeMounts:
        - {name: data,mountPath:/var/lib/postgresql/data}
      volumes:
      - name: data
        persistentVolumeClaim:{claimName: postgres-pvc}
---
apiVersion: v1
kind: Service
metadata:{name: postgres-service}
spec:
  selector:{app: postgres}
  ports:
  - port: 5432